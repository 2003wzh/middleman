<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 Middleman</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --ink: #15202b;
      --muted: #667085;
      --line: #d9e2ea;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
      --ok: #15803d;
      --shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .shell {
      width: min(1040px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(330px, 420px);
      gap: 34px;
      align-items: center;
      padding: 34px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 850;
    }

    .intro {
      display: grid;
      gap: 18px;
    }

    .eyebrow {
      width: fit-content;
      border: 1px solid #bdd8d4;
      border-radius: 999px;
      padding: 5px 10px;
      background: #eef8f6;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      max-width: 640px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead,
    .field-hint,
    .tabs button,
    .message {
      color: var(--muted);
    }

    .panel {
      display: grid;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px;
      background: var(--surface-soft);
    }

    .tabs button {
      min-height: 38px;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-weight: 760;
    }

    .tabs button.active {
      background: var(--ink);
      color: #fff;
    }

    .form {
      display: none;
      gap: 14px;
    }

    .form.active {
      display: grid;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 680;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    input:focus {
      border-color: #78bdb5;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .code-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 760;
      text-decoration: none;
      transition: background 140ms ease, transform 140ms ease;
    }

    .btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .btn.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .message {
      display: none;
      border-radius: 8px;
      padding: 12px;
      background: var(--surface-soft);
      overflow-wrap: anywhere;
    }

    .message.active {
      display: block;
    }

    .message.error {
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: var(--danger);
      font-weight: 680;
    }

    .message.ok {
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: var(--ok);
      font-weight: 680;
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
        align-items: start;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1040px);
        padding-top: 18px;
      }

      .code-row {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro" aria-label="服务介绍">
      <a class="brand" href="login.html">
        <span class="brand-mark">M</span>
        <strong>Middleman 服务工作台</strong>
      </a>
      <div class="eyebrow">账号登录</div>
      <h1>登录后继续使用 Codex 服务。</h1>
      <p class="lead">邮箱作为用户名。注册时完成邮箱验证，邀请码可填可不填。</p>
    </section>

    <section class="panel" aria-label="登录注册">
      <div class="tabs" role="tablist">
        <button id="loginTab" class="active" type="button" data-tab="login">登录</button>
        <button id="registerTab" type="button" data-tab="register">注册</button>
      </div>

      <form id="loginForm" class="form active">
        <h2>登录</h2>
        <label>
          邮箱
          <input id="loginEmail" type="email" autocomplete="email" placeholder="name@example.com">
        </label>
        <label>
          密码
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="至少 6 位">
        </label>
        <button class="btn" type="submit">登录</button>
      </form>

      <form id="registerForm" class="form">
        <h2>注册</h2>
        <label>
          邮箱
          <input id="registerEmail" type="email" autocomplete="email" placeholder="name@example.com">
        </label>
        <label>
          验证码
          <div class="code-row">
            <input id="registerCode" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6 位验证码">
            <button id="sendCode" class="btn secondary" type="button">发送验证码</button>
          </div>
        </label>
        <label>
          密码
          <input id="registerPassword" type="password" autocomplete="new-password" placeholder="至少 6 位">
        </label>
        <label>
          邀请码，可不填
          <input id="inviteCode" type="text" autocomplete="off" placeholder="有邀请码可以填这里">
        </label>
        <button class="btn" type="submit">注册并登录</button>
      </form>

      <div id="message" class="message"></div>
    </section>
  </main>

  <script>
    const loginTab = document.querySelector("#loginTab");
    const registerTab = document.querySelector("#registerTab");
    const loginForm = document.querySelector("#loginForm");
    const registerForm = document.querySelector("#registerForm");
    const loginEmail = document.querySelector("#loginEmail");
    const loginPassword = document.querySelector("#loginPassword");
    const registerEmail = document.querySelector("#registerEmail");
    const registerCode = document.querySelector("#registerCode");
    const registerPassword = document.querySelector("#registerPassword");
    const inviteCode = document.querySelector("#inviteCode");
    const sendCode = document.querySelector("#sendCode");
    const message = document.querySelector("#message");
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "index.html";

    function safeNext() {
      if (next.startsWith("/") && !next.startsWith("//")) return next;
      if (next.startsWith("index.html") || next.startsWith("pay.html") || next.startsWith("apikey.html")) return next;
      return "index.html";
    }

    function setTab(name) {
      const login = name === "login";
      loginTab.classList.toggle("active", login);
      registerTab.classList.toggle("active", !login);
      loginForm.classList.toggle("active", login);
      registerForm.classList.toggle("active", !login);
      showMessage("");
    }

    function showMessage(text, type = "") {
      message.textContent = text;
      message.className = text ? `message active ${type}` : "message";
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "请求失败。");
      }
      return data;
    }

    loginTab.addEventListener("click", () => setTab("login"));
    registerTab.addEventListener("click", () => setTab("register"));

    sendCode.addEventListener("click", async () => {
      const original = sendCode.textContent;
      sendCode.disabled = true;
      sendCode.textContent = "发送中...";
      try {
        const data = await postJson("/api/auth/send-code", {
          email: registerEmail.value.trim()
        });
        showMessage(data.devCode ? `验证码已生成：${data.devCode}` : "验证码已发送，请查看邮箱。", "ok");
      } catch (error) {
        showMessage(error.message || "验证码发送失败。", "error");
      } finally {
        sendCode.disabled = false;
        sendCode.textContent = original;
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await postJson("/api/auth/login", {
          email: loginEmail.value.trim(),
          password: loginPassword.value
        });
        window.location.href = safeNext();
      } catch (error) {
        showMessage(error.message || "登录失败。", "error");
      }
    });

    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await postJson("/api/auth/register", {
          email: registerEmail.value.trim(),
          password: registerPassword.value,
          inviteCode: inviteCode.value.trim(),
          code: registerCode.value.trim()
        });
        window.location.href = safeNext();
      } catch (error) {
        showMessage(error.message || "注册失败。", "error");
      }
    });
  </script>
</body>
</html>
